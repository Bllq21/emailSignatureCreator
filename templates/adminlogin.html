<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t.admin_login }}</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="container">
        <div class="lang-switcher">
            <a href="{{ url_for('switch_lang', lang='en') }}" class="{% if lang == 'en' %}active{% endif %}">EN</a>
            <a href="{{ url_for('switch_lang', lang='es') }}" class="{% if lang == 'es' %}active{% endif %}">ES</a>
        </div>
        <div class="header">
            <h1>{{ t.admin_login }}</h1>
        </div>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert">
                    <ul>
                        {% for message in messages %}
                            <li>{{ message }}</li>
                        {% endfor %}
                    </ul>
                </div>
            {% endif %}
        {% endwith %}
        <form action="/adminlogin?lang={{ lang }}" method="post">
            <div class="form-group">
                <label for="email">{{ t.admin_email_label }}</label>
                <input type="email" id="email" name="email" placeholder="{{ t.admin_email_placeholder }}" required>
            </div>
            <div class="form-group">
                <label for="password">{{ t.admin_password_label }}</label>
                <input type="password" id="password" name="password" placeholder="{{ t.admin_password_placeholder }}" required>
            </div>
            <button type="submit">{{ t.admin_login_btn }}</button>
        </form>
        <div class="footer-link">
            <a href="{{ url_for('home', lang=lang) }}">{{ t.go_home }}</a>
        </div>
    </div>
</body>
</html>
